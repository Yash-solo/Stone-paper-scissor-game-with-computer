<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone paper game </title>
    <link rel="stylesheet" href="stone.css">
</head>
<body>
    <nav>
        <h1>Stone paper scissor</h1>
    </nav>
    <section class="gameContainer">
        <div class="icons">
            <img src="stone.png" class="stoneBtn">
            <img src="paper.png" class="PaperBtn">
            <img src="scissor.png"class="scissorBtn">
        </div>
        <div class="result">
            <span class="win">0</span>
            <span class="lose">0</span>
            <p>Your </p>
            <p>Computer</p>
        </div>
        <div class="expression">You lost</div>
    </section>
</body>
<script src="stone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.3.1/tsparticles.confetti.bundle.min.js"></script>  
</html>
